name: Multi-Agent Trading System

on:
  schedule:
    - cron: '30 10 * * 1-5' # 4:00 PM IST
    - cron: '30 14 * * 0'    # 8:00 PM IST Sunday
  workflow_dispatch: 

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas yfinance nsepython scipy

      - name: Run Sequential Agent Pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Step 1: Scout analyzes sectors and saves active_sectors.json
          python agent.py
          
          # Step 2: Sniper reads that file and scans stocks
          python sniper_agent.py
