name: Multi-Agent Trading System

on:
  schedule:
    # Runs Monday-Friday at 10:30 UTC (4:00 PM IST)
    - cron: '30 10 * * 1-5'
    # Sunday run at 2:30 PM UTC (8:00 PM IST)
    - cron: '30 14 * * 0'
  workflow_dispatch: 

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas yfinance nsepython scipy

      - name: Run Scout Agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python agent.py

      - name: Run Sniper Agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python sniper_agent.py
