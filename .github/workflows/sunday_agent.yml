name: Sunday RS Agent

on:
  schedule:
    # This runs every Sunday at 14:30 UTC (which is 8:00 PM IST)
    - cron: '30 14 * * 0'
  workflow_dispatch: # This button allows you to run it manually anytime

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests pandas

      - name: Run Sector Scan
        env:
          # This pulls the secrets you saved in GitHub Settings
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python agent.py
