name: Multi-Agent Trading System

on:
  schedule:
    # Runs Monday-Friday at 10:30 UTC (4:00 PM IST) to catch market close signals
    - cron: '30 10 * * 1-5'
    # Keeps the Sunday run at 8:00 PM IST for weekly planning
    - cron: '30 14 * * 0'
  workflow_dispatch: 

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests pandas yfinance

      - name: Run Sequential Agent Pipeline
        env:
          # Note: ALPHA_VANTAGE is no longer needed since we switched to yfinance
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Run Scout first to generate active_sectors.json
          python agent.py
          # Run Sniper second to read the JSON and find VCPs
          python sniper_agent.py
